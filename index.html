<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Teórico DGT — Permiso B</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #efefed;
    --text: #1a1a18; --text2: #6b6b68; --text3: #9b9b97;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --success-bg: #eaf3de; --success-text: #3b6d11; --success-border: #639922;
    --danger-bg: #fcebeb; --danger-text: #a32d2d; --danger-border: #e24b4a;
    --info-bg: #e6f1fb; --info-text: #185fa5; --info-border: #378add;
    --radius: 10px; --radius-lg: 14px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #f0efe9; --text2: #a0a09a; --text3: #707068;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --success-bg: #173404; --success-text: #c0dd97; --success-border: #3b6d11;
      --danger-bg: #501313; --danger-text: #f7c1c1; --danger-border: #a32d2d;
      --info-bg: #042c53; --info-text: #85b7eb; --info-border: #185fa5;
    }
  }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.5; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
  #app { max-width: 520px; margin: 0 auto; min-height: 100dvh; padding: 0 1rem calc(1.5rem + var(--safe-bottom)); }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0 1.25rem; position: sticky; top: 0; background: var(--bg); z-index: 10; border-bottom: 0.5px solid var(--border); margin-bottom: 1.25rem; }
  .back-btn { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--text2); padding: 6px 0; display: flex; align-items: center; gap: 6px; }
  .back-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .topbar-right { display: flex; gap: 14px; font-size: 13px; color: var(--text2); align-items: center; }
  .topbar-right svg { width: 14px; height: 14px; }
  h1 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  h2 { font-size: 18px; font-weight: 600; color: var(--text); }
  h3 { font-size: 15px; font-weight: 600; color: var(--text); }
  .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 2rem; }
  .menu-item { display: flex; align-items: center; gap: 14px; padding: 1rem 1.25rem; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); cursor: pointer; text-align: left; width: 100%; transition: background 0.15s; margin-bottom: 10px; }
  .menu-item:active { background: var(--bg2); }
  .menu-icon { width: 40px; height: 40px; border-radius: var(--radius); background: var(--bg2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .menu-icon svg { width: 20px; height: 20px; color: var(--text2); }
  .menu-label { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .menu-desc { font-size: 13px; color: var(--text2); }
  .progress-bar { height: 4px; background: var(--bg2); border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--text); border-radius: 2px; transition: width 0.3s; }
  .question-text { font-size: 17px; font-weight: 500; color: var(--text); margin-bottom: 1.5rem; line-height: 1.55; }
  .option-btn { display: block; width: 100%; padding: 0.875rem 1rem; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; text-align: left; font-size: 15px; color: var(--text); margin-bottom: 8px; transition: background 0.15s, border-color 0.15s; line-height: 1.4; }
  .option-btn:active:not(:disabled) { background: var(--bg2); }
  .option-btn:disabled { cursor: default; }
  .option-correct { background: var(--success-bg) !important; border: 1.5px solid var(--success-border) !important; color: var(--success-text) !important; }
  .option-wrong { background: var(--danger-bg) !important; border: 1.5px solid var(--danger-border) !important; color: var(--danger-text) !important; }
  .next-btn { width: 100%; padding: 0.875rem; background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; font-size: 15px; color: var(--text); margin-top: 1.25rem; transition: background 0.15s; }
  .next-btn:active { background: var(--bg2); }
  .doc-link { display: flex; align-items: center; gap: 8px; margin-top: 0.875rem; padding: 0.75rem 1rem; background: var(--info-bg); border: 0.5px solid var(--info-border); border-radius: var(--radius); font-size: 13px; color: var(--info-text); text-decoration: none; }
  .doc-link svg { width: 14px; height: 14px; flex-shrink: 0; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 1.5rem 0; }
  .stat-card { background: var(--bg2); border-radius: var(--radius); padding: 0.875rem; text-align: center; }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 600; color: var(--text); }
  .result-icon { font-size: 52px; text-align: center; margin: 1.5rem 0 0.75rem; }
  .result-title { font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 6px; }
  .result-sub { font-size: 14px; color: var(--text2); text-align: center; margin-bottom: 0; }
  .tema-row { display: flex; align-items: center; justify-content: space-between; padding: 0.875rem 1.25rem; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); cursor: pointer; width: 100%; text-align: left; margin-bottom: 8px; transition: background 0.15s; }
  .tema-row:active { background: var(--bg2); }
  .tema-nombre { font-size: 15px; color: var(--text); }
  .tema-count { font-size: 13px; color: var(--text2); }
  .resumen-box { background: var(--bg2); border-radius: var(--radius); padding: 1rem; margin-bottom: 1.5rem; font-size: 14px; color: var(--text2); line-height: 1.7; }
  .tema-q { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
  .tema-q-text { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 0.75rem; line-height: 1.5; }
  .tema-opt { display: block; width: 100%; padding: 0.5rem 0.875rem; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; text-align: left; font-size: 13px; color: var(--text2); margin-bottom: 6px; transition: background 0.15s; }
  .tema-opt:active:not(:disabled) { background: var(--bg3); }
  .tema-opt:disabled { cursor: default; }
  .color-danger { color: var(--danger-text) !important; }
  .header-pad { padding-top: 1.25rem; }
  .selector-row { display: flex; align-items: center; justify-content: space-between; padding: 0.875rem 1.25rem; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); cursor: pointer; width: 100%; text-align: left; margin-bottom: 8px; transition: background 0.15s; }
  .selector-row:active { background: var(--bg2); }
  .reset-btn { display: flex; align-items: center; gap: 6px; background: none; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; font-size: 13px; color: var(--text2); transition: background 0.15s; }
  .reset-btn:active { background: var(--bg2); }
  .practica-score { font-size: 13px; color: var(--text2); }
</style>
</head>
<body>
<div id="app"></div>
<script>
const DOC_URL = 'https://docs.google.com/document/d/1DdxP2pPddi5MmiaHNFekt-wCby9ZDkhBtKOwNoLOHhU/edit';

const TEMAS = [
  {
    id: 'documentacion',
    nombre: 'Documentación y puntos',
    temaRef: 'Tema 1',
    resumen: 'La documentación obligatoria al conducir es: permiso de conducción, permiso de circulación y tarjeta ITV. El recibo del seguro no es obligatorio pero sí recomendable. Puede presentarse en formato físico o digital (app MiDGT). El permiso de conducción se renueva cada 10 años (cada 5 años a partir de los 65). Plazos importantes: 15 días para comunicar cambios de datos o llevar el vehículo a ITV tras modificación; 10 días si un agente detiene el vehículo sin ITV o para comunicar la venta; 30 días para solicitar documentación al comprar de ocasión. La pérdida de puntos no es inmediata, sino cuando la sanción sea firme. Máximo 8 puntos perdidos al día.',
    preguntas: [
      { p: '¿Cuál de estos documentos NO es obligatorio llevar al conducir?', ops: ['Permiso de conducción', 'Recibo del seguro', 'Tarjeta ITV'], r: 1 },
      { p: '¿Con qué frecuencia se renueva el permiso de conducción para un conductor de 50 años?', ops: ['Cada 5 años', 'Cada 10 años', 'Cada 15 años'], r: 1 },
      { p: 'Si un agente de tráfico detiene tu vehículo y no lleva la ITV, ¿cuántos días tienes para aprobarla?', ops: ['5 días', '10 días', '15 días'], r: 1 },
      { p: '¿Cuántos puntos como máximo se pueden perder en un solo día?', ops: ['4 puntos', '6 puntos', '8 puntos'], r: 2 },
      { p: 'Para recuperar todos los puntos sin hacer ningún curso, ¿qué debes hacer?', ops: ['No cometer infracciones durante 1 año', 'No cometer infracciones durante 2 años', 'Esperar 6 meses y pagar una multa'], r: 1 },
      { p: 'El resultado "desfavorable" en la ITV significa:', ops: ['Puedes seguir circulando con normalidad', 'Solo puedes ir al taller y tienes 2 meses para repetir la ITV', 'Debes ir al taller en grúa'], r: 1 },
      { p: '¿Cuántos días tienes para comunicar la venta de tu vehículo?', ops: ['5 días', '10 días', '30 días'], r: 1 },
      { p: 'La documentación del vehículo puede presentarse en formato digital mediante:', ops: ['Cualquier app de fotos', 'La app MiDGT', 'Un correo electrónico'], r: 1 },
    ]
  },
  {
    id: 'semaforos',
    nombre: 'Semáforos y agentes',
    temaRef: 'Tema 2',
    resumen: 'Semáforos circulares: rojo fijo o intermitente = detenerse; amarillo fijo = detenerse salvo que no haya seguridad; amarillo intermitente = pasar cediendo el paso; verde = circular con prioridad, excepto si bloqueas el cruce; flecha verde = pasar cediendo el paso. El semáforo cuadrado indica si el carril está abierto o cerrado, no regula prioridad. Agentes: brazo levantado = se detiene todo el mundo; brazos en cruz = se detienen los que corten esa trayectoria; silbato largo = reanudar marcha; silbato corto = detenerse.',
    preguntas: [
      { p: '¿Qué debes hacer ante un semáforo en amarillo fijo?', ops: ['Acelerar para pasar antes de que cambie', 'Detenerte, salvo que no puedas hacerlo con seguridad', 'Pasar cediendo el paso'], r: 1 },
      { p: '¿Qué significa el semáforo en amarillo intermitente?', ops: ['Detenerse obligatoriamente', 'Pasar con prioridad', 'Pasar cediendo el paso'], r: 2 },
      { p: 'Un semáforo en verde te permite circular, pero con una excepción. ¿Cuál?', ops: ['Si llueve', 'Si hay peatones en la acera', 'Si vas a bloquear el cruce'], r: 2 },
      { p: '¿Para qué sirve el semáforo cuadrado?', ops: ['Regular la prioridad entre vehículos', 'Indicar si el carril está abierto o cerrado', 'Señalizar paso de peatones'], r: 1 },
      { p: 'Un agente levanta el brazo. ¿Qué deben hacer los vehículos?', ops: ['Solo los que vienen de frente se detienen', 'Todos los vehículos se detienen', 'Solo los que van a girar se detienen'], r: 1 },
      { p: '¿Qué significa un toque largo de silbato del agente?', ops: ['Detenerse', 'Reanudar la marcha', 'Reducir la velocidad'], r: 1 },
      { p: 'Un semáforo rojo intermitente indica:', ops: ['Precaución, puedes pasar lentamente', 'Detenerse obligatoriamente', 'Ceder el paso y continuar'], r: 1 },
    ]
  },
  {
    id: 'senales',
    nombre: 'Señales verticales',
    temaRef: 'Tema 3',
    resumen: 'Las señales de peligro son triángulos con borde rojo. Las señales de reglamentación son circulares: fondo blanco con borde rojo = prohibición o restricción; fondo azul circular = obligación. Las señales de indicación tienen fondo azul o verde. Cuando hay contradicciones entre señales del mismo tipo se obedece la más restrictiva; entre tipos distintos, la más prioritaria. Si una señal está solo a la derecha la obedece todo el mundo. STOP = detención obligatoria. Ceda el paso = ceder a los vehículos de la vía a la que se accede.',
    preguntas: [
      { p: '¿Qué indica una señal triangular con borde rojo?', ops: ['Obligación', 'Peligro', 'Prohibición'], r: 1 },
      { p: '¿Qué forma tienen las señales de obligación?', ops: ['Triángulo rojo', 'Cuadrado azul', 'Círculo azul'], r: 2 },
      { p: 'Una señal circular con fondo blanco y borde rojo indica:', ops: ['Obligación', 'Prohibición o restricción', 'Información'], r: 1 },
      { p: '¿Qué significa la señal de STOP?', ops: ['Reducir la velocidad y seguir', 'Detención obligatoria y ceder el paso', 'Solo parar si hay vehículos'], r: 1 },
      { p: 'Hay dos señales del mismo tipo que se contradicen entre sí. ¿Cuál obedeces?', ops: ['La que está a la derecha', 'La más restrictiva', 'La más prioritaria'], r: 1 },
      { p: '¿Qué indica una señal de "Ceda el paso"?', ops: ['Detenerse siempre obligatoriamente', 'Ceder el paso a los vehículos de la vía a la que se accede', 'Prohibido el acceso'], r: 1 },
      { p: 'Las señales de indicación tienen fondo de color:', ops: ['Rojo', 'Azul o verde', 'Amarillo'], r: 1 },
      { p: 'Una señal está solo a la derecha de la calzada. ¿A quién afecta?', ops: ['Solo a los que giran a la derecha', 'A todo el mundo', 'Solo a los que van de frente'], r: 1 },
    ]
  },
  {
    id: 'marcas',
    nombre: 'Marcas viales',
    temaRef: 'Tema 5',
    resumen: 'Línea continua = prohíbe adelantar y cruzar. Línea discontinua = permite adelantar si es seguro. Cuando hay una línea continua adosada a una discontinua, obedeces la que está más cerca de tu carril. Marcas discontinuas dobles = carril reversible. Cebreado en el suelo = prohibido parar y estacionar. Línea continua amarilla = prohibido parar y estacionar. Línea discontinua amarilla o zig-zag = prohibido estacionar, se permite parar. Las flechas de selección de carril indican el destino obligatorio de ese carril.',
    preguntas: [
      { p: '¿Qué significa una línea longitudinal continua en la calzada?', ops: ['Puedes adelantar si hay visibilidad', 'Prohibido cruzar o adelantar', 'Indica el carril bici'], r: 1 },
      { p: 'Hay una línea continua adosada a una discontinua. ¿Cuál obedeces?', ops: ['Siempre la continua', 'La que está más cerca de tu carril', 'Siempre la discontinua'], r: 1 },
      { p: '¿Qué indica un cebreado pintado en el suelo?', ops: ['Zona de adelantamiento', 'Prohibido parar y estacionar', 'Paso de peatones'], r: 1 },
      { p: '¿Qué significa una línea amarilla continua en el borde de la calzada?', ops: ['Estacionamiento limitado', 'Prohibido parar y estacionar', 'Prohibido estacionar, se permite parar'], r: 1 },
      { p: 'Una línea amarilla discontinua o zig-zag en el bordillo indica:', ops: ['Prohibido parar y estacionar', 'Prohibido estacionar, se permite parar', 'Solo permitido taxis'], r: 1 },
      { p: 'Las marcas discontinuas dobles en el centro de la calzada indican:', ops: ['Prohibido adelantar', 'Carril reversible', 'Doble sentido de circulación'], r: 1 },
      { p: '¿Qué indica una flecha de selección de carril?', ops: ['Velocidad mínima en ese carril', 'El destino obligatorio del carril', 'Que el carril está cerrado'], r: 1 },
    ]
  },
  {
    id: 'alumbrado',
    nombre: 'Alumbrado del vehículo',
    temaRef: 'Tema 6',
    resumen: 'Las luces del vehículo sirven para ver, ser visto y señalizar. Colores: delante blanco, detrás rojo, lateral amarillo. Se encienden entre la puesta y salida del sol, en condiciones desfavorables y en túneles. Una vía está insuficientemente iluminada cuando no se distingue un vehículo oscuro a 50 m o la matrícula a 10 m. La luz de posición no puede usarse sola al circular (debe acompañar a la de cruce). La luz de carretera es obligatoria en vía interurbana, insuficientemente iluminada, a más de 40 km/h y sin deslumbrar. La luz de estacionamiento se usa de noche, en travesía e insuficientemente iluminada.',
    preguntas: [
      { p: '¿De qué color son las luces traseras de un vehículo?', ops: ['Blanco', 'Amarillo', 'Rojo'], r: 2 },
      { p: '¿Cuándo se considera que una vía está insuficientemente iluminada?', ops: ['Cuando hay menos de 3 farolas por km', 'Cuando no se distingue un vehículo oscuro a 50 m o la matrícula a 10 m', 'Cuando es de noche'], r: 1 },
      { p: '¿Puedes circular solo con la luz de posición encendida?', ops: ['Sí, es suficiente de noche', 'No, debe ir acompañada de la luz de cruce', 'Solo en vías urbanas'], r: 1 },
      { p: '¿Cuándo es obligatoria la luz de carretera (largo alcance)?', ops: ['Siempre que seas fuera de poblado', 'En vía interurbana, insuficientemente iluminada, a más de 40 km/h y sin deslumbrar', 'Solo en autopistas'], r: 1 },
      { p: '¿Cuándo debes usar la luz de estacionamiento?', ops: ['Siempre que aparques de noche', 'De noche, en travesía e insuficientemente iluminada', 'En cualquier estacionamiento nocturno fuera de poblado'], r: 1 },
      { p: 'La luz de emergencia (luces de avería) es de color:', ops: ['Rojo', 'Blanco', 'Amarillo'], r: 2 },
      { p: '¿En qué casos debes encender las luces del vehículo?', ops: ['Solo de noche', 'Entre puesta y salida del sol, condiciones desfavorables y túneles', 'Solo en condiciones de niebla'], r: 1 },
    ]
  },
  {
    id: 'via',
    nombre: 'Utilización de la vía',
    temaRef: 'Tema 7',
    resumen: 'En general se circula por el carril derecho. En poblado se puede usar el carril más conveniente para el destino. Están obligados a circular por el arcén: peatones, animales, ciclos, ciclomotores y vehículos especiales ligeros. El carril izquierdo está prohibido para camiones pesados, furgones pesados y conjuntos de más de 7 metros. Circular en paralelo: ciclos y VMP sí pueden; ciclomotores como norma general no; motocicletas nunca. En una glorieta o cruce se abandona dejando el centro a la izquierda. El carril VAO permite entrada con 1 ocupante a: minusválidos, bus, taxi, ambulancia, policía, bomberos, motocicletas y etiqueta 0 emisiones.',
    preguntas: [
      { p: '¿Por qué carril debes circular como norma general fuera de poblado?', ops: ['Por el izquierdo', 'Por el central', 'Por el derecho'], r: 2 },
      { p: '¿Quién está obligado a circular por el arcén?', ops: ['Solo los peatones', 'Peatones, ciclos, ciclomotores y vehículos especiales ligeros', 'Todos los vehículos lentos'], r: 1 },
      { p: '¿Pueden las motocicletas circular en paralelo?', ops: ['Sí, siempre', 'Solo en autopistas', 'No, nunca'], r: 2 },
      { p: '¿Cuál de estos puede entrar en el carril VAO con un solo ocupante?', ops: ['Turismo con etiqueta C', 'Motocicleta', 'Furgoneta de reparto'], r: 1 },
      { p: '¿A quién está prohibido el carril izquierdo en vías de varios carriles?', ops: ['A los turismos que van despacio', 'A camiones pesados, furgones pesados y conjuntos de más de 7 metros', 'A las motocicletas'], r: 1 },
      { p: 'Al salir de una glorieta, ¿cómo debes hacerlo?', ops: ['Dejando el centro a la derecha', 'Dejando el centro a la izquierda', 'Por cualquier carril disponible'], r: 1 },
      { p: '¿Pueden los ciclos circular en paralelo?', ops: ['No, nunca', 'Sí, pueden', 'Solo en vías urbanas'], r: 1 },
    ]
  },
  {
    id: 'velocidad',
    nombre: 'Velocidades y límites',
    temaRef: 'Tema 8',
    resumen: 'Límites genéricos: autopistas y autovías 120 km/h; carreteras convencionales con arcén ≥1,5 m hasta 90 km/h; vías urbanas 50 km/h; zonas residenciales 20 km/h; zonas de coexistencia 20 km/h; plataforma única calzada-acera 20 km/h. Conductores noveles (primer año): 100 km/h en autopistas. La velocidad mínima en autopistas es la mitad del límite máximo. Transporte escolar fuera de poblado: -10 km/h. Mercancías peligrosas: -10 km/h. Conducir a 35 grados equivale a 0,5 g/l en sangre.',
    preguntas: [
      { p: '¿Cuál es el límite de velocidad genérico en autopistas para un turismo?', ops: ['100 km/h', '110 km/h', '120 km/h'], r: 2 },
      { p: '¿Cuál es el límite de velocidad en vías urbanas si no hay señal?', ops: ['30 km/h', '50 km/h', '60 km/h'], r: 1 },
      { p: '¿Qué velocidad máxima tienen los conductores noveles en autopista?', ops: ['90 km/h', '100 km/h', '120 km/h'], r: 1 },
      { p: '¿Cuál es el límite en zonas de coexistencia y áreas residenciales?', ops: ['10 km/h', '20 km/h', '30 km/h'], r: 1 },
      { p: 'La velocidad mínima en autopista es:', ops: ['La mitad del límite máximo permitido', '60 km/h siempre', '40 km/h'], r: 0 },
      { p: 'El transporte escolar fuera de poblado debe circular:', ops: ['A la misma velocidad que el resto', '10 km/h por debajo del límite genérico', '20 km/h por debajo del límite'], r: 1 },
      { p: 'Ante niebla densa, ¿qué debes hacer con la velocidad?', ops: ['Mantenerla para no interrumpir el tráfico', 'Reducirla aunque estés dentro del límite', 'Acelerar para salir de la zona'], r: 1 },
    ]
  },
  {
    id: 'adelantamiento',
    nombre: 'Adelantamiento y distancia',

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let state = { view: 'menu' };

function docLink(temaRef, temaNombre) {
  return `<a href="${DOC_URL}" target="_blank" class="doc-link">${SVG.external} Repasar ${temaRef}: ${temaNombre}</a>`;
}

function render() {
  const app = document.getElementById('app');
  const views = { menu: renderMenu, examen: renderExamen, 'practica-selector': renderPracticaSelector, practica: renderPractica, temas: renderTemas, tema: renderTema, resultado: renderResultado };

  bindEvents();
}

function renderPractica() {
  const { preguntas, actual, respondida, seleccion, aciertos, fallos } = state;
  const q = preguntas[actual];
  const tema = TEMAS.find(t => t.id === q.temaId);
  return `
  <div class="topbar">
    <button class="back-btn" data-action="start-practica-selector">${SVG.arrow} Salir</button>
    <div class="topbar-right">
      <span class="practica-score" style="color:var(--success-text);">✓ ${aciertos}</span>
      <span class="practica-score" style="color:var(--danger-text);">✗ ${fallos}</span>
      <span style="font-size:12px;color:var(--text3);">${q.temaRef}</span>
    </div>
  </div>
  <p class="question-text">${q.p}</p>
  <div>
    ${q.ops.map((o, i) => {
      let cls = 'option-btn';
      if (respondida) {
        if (i === q.r) cls += ' option-correct';
        else if (i === seleccion && seleccion !== q.r) cls += ' option-wrong';
      }
      return `<button class="${cls}" data-action="resp-practica" data-idx="${i}" ${respondida ? 'disabled' : ''}>${o}</button>`;
    }).join('')}
  </div>
  ${respondida && seleccion !== q.r ? docLink(q.temaRef, q.temaNombre) : ''}
  ${respondida ? `<button class="next-btn" data-action="next-practica">Siguiente pregunta</button>` : ''}`;
}

function renderExamen() {
  const { preguntas, actual, respuestas, tiempo } = state;
  const q = preguntas[actual];
  const total = preguntas.length;
  const fallos = respuestas.filter((r, i) => r !== null && r !== preguntas[i].r).length;
  const mins = Math.floor(tiempo / 60);
  const secs = String(tiempo % 60).padStart(2, '0');
  const pct = ((actual + 1) / total * 100).toFixed(0);
  return `
  <div class="topbar">
    <button class="back-btn" data-action="menu">${SVG.arrow} Salir</button>
    <div class="topbar-right">
      <span id="timer-display">${SVG.clock} ${mins}:${secs}</span>
      <span style="color:${fallos >= 3 ? 'var(--danger-text)' : 'var(--text2)'}">${SVG.x} ${fallos}/3</span>
      <span>${actual + 1}/${total}</span>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  <p class="question-text">${q.p}</p>
  <div id="opciones">
    ${q.ops.map((o, i) => `<button class="option-btn" data-action="resp-examen" data-idx="${i}">${o}</button>`).join('')}
  </div>`;
}

function renderTemas() {
  return `
  <div class="topbar">
    <button class="back-btn" data-action="menu">${SVG.arrow} Volver</button>
    <div></div>
  </div>
  <h2 style="margin-bottom:1rem;">Temas</h2>
  ${TEMAS.map(t => `
    <button class="tema-row" data-action="ver-tema" data-id="${t.id}">
      <span class="tema-nombre">${t.nombre}</span>
      <span class="tema-count">${t.preguntas.length} preguntas ${SVG.chevron.replace('svg', 'svg style="width:14px;height:14px;display:inline;vertical-align:-3px;"')}</span>
    </button>
  `).join('')}`;
}

function renderTema() {
  const tema = TEMAS.find(t => t.id === state.temaId);
  const { respondidas } = state;
  const totalRespondidas = Object.keys(respondidas).length;
  const todasRespondidas = totalRespondidas === tema.preguntas.length;
  return `
  <div class="topbar">
    <button class="back-btn" data-action="start-temas">${SVG.arrow} Temas</button>
    ${todasRespondidas ? `<button class="reset-btn" data-action="reset-tema">${SVG.reset} Reiniciar</button>` : '<div></div>'}
  </div>
  <h2 style="margin-bottom:0.5rem;">${tema.nombre}</h2>
  <p style="font-size:13px;color:var(--text2);margin-bottom:1rem;">${tema.temaRef}</p>
  <div class="resumen-box">${tema.resumen}</div>
  <h3 style="margin-bottom:1rem;">Preguntas</h3>
  ${tema.preguntas.map((q, qi) => {
    const resp = respondidas[qi];
    return `
    <div class="tema-q">
      <p class="tema-q-text">${q.p}</p>
      ${q.ops.map((o, oi) => {
        let cls = 'tema-opt';
        if (resp !== undefined) {
          if (oi === q.r) cls += ' option-correct';
          else if (oi === resp && resp !== q.r) cls += ' option-wrong';
        }
        return `<button class="${cls}" ${resp !== undefined ? 'disabled' : ''} data-action="resp-tema" data-qi="${qi}" data-oi="${oi}">${o}</button>`;
      }).join('')}
      ${resp !== undefined && resp !== q.r ? docLink(tema.temaRef, tema.nombre) : ''}
    </div>`;
  }).join('')}`;
}

function renderResultado() {
  const { preguntas, respuestas, tiempoTotal } = state;
  const fallos = respuestas.filter((r, i) => r !== null && r !== preguntas[i].r).length;
  const aciertos = respuestas.filter((r, i) => r === preguntas[i].r).length;
  const aprobado = fallos <= 3;
  const mins = Math.floor(tiempoTotal / 60);
  const secs = String(tiempoTotal % 60).padStart(2, '0');
  const errores = preguntas.reduce((acc, q, i) => {
    if (respuestas[i] !== null && respuestas[i] !== q.r) acc.push({ q, seleccion: respuestas[i] });
    return acc;
  }, []);
  const erroresHTML = errores.length > 0 ? `
    <h3 style="margin:1.75rem 0 1rem;">Preguntas falladas</h3>
    ${errores.map(({ q, seleccion }) => `
      <div class="tema-q" style="margin-bottom:12px;">
        <p class="tema-q-text">${q.p}</p>
        ${q.ops.map((o, oi) => {
          let cls = 'tema-opt';
          if (oi === q.r) cls += ' option-correct';
          else if (oi === seleccion) cls += ' option-wrong';
          return `<button class="${cls}" disabled>${o}</button>`;
        }).join('')}
        ${docLink(q.temaRef, q.temaNombre)}
      </div>
    `).join('')}
  ` : `<p style="font-size:14px;color:var(--text2);text-align:center;margin-top:1.5rem;">Sin errores. ¡Perfecto!</p>`;
  return `
  <div style="padding-top:1.25rem;">
    <div class="result-icon">${aprobado ? '✅' : '❌'}</div>
    <h2 class="result-title" style="color:${aprobado ? 'var(--success-text)' : 'var(--danger-text)'};">${aprobado ? 'Aprobado' : 'Suspenso'}</h2>
    <p class="result-sub" style="margin-bottom:1.5rem;">${aprobado ? 'Has superado el umbral mínimo.' : 'Has cometido más de 3 errores.'}</p>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Aciertos</div><div class="stat-value">${aciertos}</div></div>
      <div class="stat-card"><div class="stat-label">Fallos</div><div class="stat-value ${fallos > 3 ? 'color-danger' : ''}">${fallos}</div></div>
      <div class="stat-card"><div class="stat-label">Tiempo</div><div class="stat-value">${mins}:${secs}</div></div>
    </div>
    <button class="next-btn" data-action="menu">Volver al menú</button>
    ${erroresHTML}
  </div>`;
}

function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });
}

function handleAction(e) {
  const btn = e.currentTarget;
  const action = btn.dataset.action;
  if (action === 'menu') {
    if (state.timer) clearInterval(state.timer);
    state = { view: 'menu' };
  } else if (action === 'start-examen') {
    const preguntas = shuffle(TODAS).slice(0, 30);
    const timer = setInterval(() => {
      state.tiempo++;
      if (state.tiempo >= 2400) { terminarExamen(); return; }
      const el = document.getElementById('timer-display');
      if (el) {
        const m = Math.floor(state.tiempo / 60);
        const s = String(state.tiempo % 60).padStart(2, '0');
        el.innerHTML = `${SVG.clock} ${m}:${s}`;
      }
    }, 1000);
    state = { view: 'examen', preguntas, actual: 0, respuestas: new Array(30).fill(null), tiempo: 0, timer };
  } else if (action === 'start-practica-selector') {
    if (state.timer) clearInterval(state.timer);
    state = { view: 'practica-selector' };
  } else if (action === 'start-practica') {
    const temaId = btn.dataset.temaId;
    const pool = temaId === 'all' ? TODAS : TODAS.filter(q => q.temaId === temaId);
    state = { view: 'practica', preguntas: shuffle(pool), actual: 0, respondida: false, seleccion: null, aciertos: 0, fallos: 0 };
  } else if (action === 'start-temas') {
    if (state.timer) clearInterval(state.timer);
    state = { view: 'temas' };
  } else if (action === 'ver-tema') {
    state = { view: 'tema', temaId: btn.dataset.id, respondidas: {} };
  } else if (action === 'reset-tema') {
    state = { view: 'tema', temaId: state.temaId, respondidas: {} };
  } else if (action === 'resp-examen') {
    const idx = parseInt(btn.dataset.idx);
    state.respuestas[state.actual] = idx;
    if (state.actual >= state.preguntas.length - 1) { terminarExamen(); return; }
    state.actual++;
  } else if (action === 'resp-practica') {
    const idx = parseInt(btn.dataset.idx);
    state.seleccion = idx;
    state.respondida = true;
    if (idx === state.preguntas[state.actual].r) state.aciertos++;
    else state.fallos++;
  } else if (action === 'next-practica') {
    state.actual = (state.actual + 1) % state.preguntas.length;
    state.respondida = false;
    state.seleccion = null;
  } else if (action === 'resp-tema') {
    const qi = parseInt(btn.dataset.qi);
    const oi = parseInt(btn.dataset.oi);
    state.respondidas = { ...state.respondidas, [qi]: oi };
  }
  render();
}

function terminarExamen() {
  if (state.timer) clearInterval(state.timer);
  state.tiempoTotal = state.tiempo;
  state.view = 'resultado';
  render();
}

render();
</script>
</body>
</html>
