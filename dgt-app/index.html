<title>Teórico DGT — Permiso B</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #efefed;
    --text: #1a1a18; --text2: #6b6b68; --text3: #9b9b97;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --success-bg: #eaf3de; --success-text: #3b6d11; --success-border: #639922;
    --danger-bg: #fcebeb; --danger-text: #a32d2d; --danger-border: #e24b4a;
    --info-bg: #e6f1fb; --info-text: #185fa5; --info-border: #378add;
    --radius: 10px; --radius-lg: 14px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #f0efe9; --text2: #a0a09a; --text3: #707068;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --success-bg: #173404; --success-text: #c0dd97; --success-border: #3b6d11;
      --danger-bg: #501313; --danger-text: #f7c1c1; --danger-border: #a32d2d;
      --info-bg: #042c53; --info-text: #85b7eb; --info-border: #185fa5;
    }
  }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.5; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
  #app { max-width: 520px; margin: 0 auto; min-height: 100dvh; padding: 0 1rem calc(1.5rem + var(--safe-bottom)); }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0 1.25rem; position: sticky; top: 0; background: var(--bg); z-index: 10; border-bottom: 0.5px solid var(--border); margin-bottom: 1.25rem; }
  .back-btn { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--text2); padding: 6px 0; display: flex; align-items: center; gap: 6px; }
  .back-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .topbar-right { display: flex; gap: 14px; font-size: 13px; color: var(--text2); align-items: center; }
  h1 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  h2 { font-size: 18px; font-weight: 600; color: var(--text); }
  h3 { font-size: 15px; font-weight: 600; color: var(--text); }
  .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 2rem; }
  .menu-item { display: flex; align-items: center; gap: 14px; padding: 1rem 1.25rem; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); cursor: pointer; text-align: left; width: 100%; margin-bottom: 10px; }
  .menu-item:active { background: var(--bg2); }
  .menu-icon { width: 40px; height: 40px; border-radius: var(--radius); background: var(--bg2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .menu-icon svg { width: 20px; height: 20px; color: var(--text2); }
  .menu-label { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .menu-desc { font-size: 13px; color: var(--text2); }
  .progress-bar { height: 4px; background: var(--bg2); border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--text); border-radius: 2px; transition: width 0.3s; }
  .question-text { font-size: 17px; font-weight: 500; color: var(--text); margin-bottom: 1.5rem; line-height: 1.55; }
  .option-btn { display: block; width: 100%; padding: 0.875rem 1rem; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; text-align: left; font-size: 15px; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
  .option-btn:active:not(:disabled) { background: var(--bg2); }
  .option-btn:disabled { cursor: default; }
  .option-correct { background: var(--success-bg) !important; border: 1.5px solid var(--success-border) !important; color: var(--success-text) !important; }
  .option-wrong { background: var(--danger-bg) !important; border: 1.5px solid var(--danger-border) !important; color: var(--danger-text) !important; }
  .next-btn { width: 100%; padding: 0.875rem; background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; font-size: 15px; color: var(--text); margin-top: 1.25rem; }
  .next-btn:active { background: var(--bg2); }
  .doc-link { display: flex; align-items: center; gap: 8px; margin-top: 0.875rem; padding: 0.75rem 1rem; background: var(--info-bg); border: 0.5px solid var(--info-border); border-radius: var(--radius); font-size: 13px; color: var(--info-text); text-decoration: none; }
  .doc-link svg { width: 14px; height: 14px; flex-shrink: 0; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 1.5rem 0; }
  .stat-card { background: var(--bg2); border-radius: var(--radius); padding: 0.875rem; text-align: center; }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 600; color: var(--text); }
  .result-icon { font-size: 52px; text-align: center; margin: 1.5rem 0 0.75rem; }
  .result-title { font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 6px; }
  .result-sub { font-size: 14px; color: var(--text2); text-align: center; }
  .tema-row { display: flex; align-items: center; justify-content: space-between; padding: 0.875rem 1.25rem; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); cursor: pointer; width: 100%; text-align: left; margin-bottom: 8px; }
  .tema-row:active { background: var(--bg2); }
  .resumen-box { background: var(--bg2); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; font-size: 14px; color: var(--text2); line-height: 1.7; }
  .tema-img { width: 100%; border-radius: var(--radius); margin-bottom: 1rem; display: block; }
  .tema-img-caption { font-size: 12px; color: var(--text3); text-align: center; margin-top: -0.5rem; margin-bottom: 1rem; }
  .tema-q { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
  .tema-q-text { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 0.75rem; line-height: 1.5; }
  .tema-opt { display: block; width: 100%; padding: 0.5rem 0.875rem; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; text-align: left; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .tema-opt:active:not(:disabled) { background: var(--bg3); }
  .tema-opt:disabled { cursor: default; }
  .color-danger { color: var(--danger-text) !important; }
  .header-pad { padding-top: 1.25rem; }
  .selector-row { display: flex; align-items: center; justify-content: space-between; padding: 0.875rem 1.25rem; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); cursor: pointer; width: 100%; text-align: left; margin-bottom: 8px; }
  .selector-row:active { background: var(--bg2); }
  .reset-btn { display: flex; align-items: center; gap: 6px; background: none; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; font-size: 13px; color: var(--text2); }
  .reset-btn:active { background: var(--bg2); }
  .section-title { font-size: 13px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin: 1.5rem 0 0.75rem; }
</style>
</head>

<script>
const DOC_URL = 'https://docs.google.com/document/d/1DdxP2pPddi5MmiaHNFekt-wCby9ZDkhBtKOwNoLOHhU/edit';

const TEMAS = [
  {
    id: 'documentacion', nombre: 'Documentación y puntos', temaRef: 'Tema 2',
    imgs: [
      { src: 'images/doc_1.jpg', cap: 'Documentación obligatoria del conductor' },
      { src: 'images/doc_2.jpg', cap: 'Permiso por puntos: infracciones y recuperación' },
    ],
    resumen: `<p>La documentación obligatoria al conducir son tres documentos: el permiso de conducción, el permiso de circulación del vehículo y la tarjeta ITV. El recibo del seguro <strong>no es obligatorio</strong> llevarlo, aunque sí es recomendable. Toda la documentación puede presentarse en formato físico o digital a través de la app MiDGT.</p>
<p><strong>Renovaciones:</strong> el permiso de conducción se renueva cada 10 años (cada 5 años a partir de los 65). El permiso de circulación solo cambia cuando cambia el titular del vehículo.</p>
<p><strong>Plazos importantes:</strong></p>
<ul>
<li>15 días para comunicar cambios en los datos personales</li>
<li>15 días para llevar el vehículo a ITV extraordinaria si lo has modificado</li>
<li>10 días si un agente detiene tu vehículo sin ITV vigente</li>
<li>10 días para comunicar la venta de tu vehículo</li>
<li>30 días para solicitar documentación al comprar un vehículo de ocasión</li>
</ul>
<p><strong>ITV:</strong> resultado favorable = aprobado; desfavorable = solo puedes ir al taller y tienes 2 meses para repetirla; negativa = solo puedes moverlo en grúa.</p>
<p><strong>Permiso por puntos:</strong> se pueden perder un máximo de 8 puntos al día. La pérdida no es inmediata, sino cuando la sanción sea firme. Para recuperar la totalidad de puntos sin curso: no cometer infracciones durante 2 años (recuperas hasta 12 puntos). Curso de recuperación total: esperar 6 meses (3 para profesionales), 20 horas de curso + examen, recuperas 8 puntos. Curso parcial voluntario: 10 horas, recuperas 4 puntos.</p>`,
    preguntas: [
      { p: '¿Cuál de estos documentos NO es obligatorio llevar al conducir?', ops: ['Permiso de conducción', 'Recibo del seguro', 'Tarjeta ITV'], r: 1 },
      { p: '¿Con qué frecuencia se renueva el permiso de conducción para un conductor de 50 años?', ops: ['Cada 5 años', 'Cada 10 años', 'Cada 15 años'], r: 1 },
      { p: 'Si un agente detiene tu vehículo sin ITV vigente, ¿cuántos días tienes para aprobarla?', ops: ['5 días', '10 días', '15 días'], r: 1 },
      { p: '¿Cuántos puntos como máximo se pueden perder en un solo día?', ops: ['4 puntos', '6 puntos', '8 puntos'], r: 2 },
      { p: 'Para recuperar todos los puntos sin hacer ningún curso, ¿qué debes hacer?', ops: ['No cometer infracciones durante 1 año', 'No cometer infracciones durante 2 años', 'Esperar 6 meses y pagar una multa'], r: 1 },
      { p: 'El resultado "desfavorable" en la ITV significa:', ops: ['Puedes seguir circulando con normalidad', 'Solo puedes ir al taller y tienes 2 meses para repetir la ITV', 'Debes ir al taller en grúa'], r: 1 },
      { p: '¿Cuántos días tienes para comunicar la venta de tu vehículo a la DGT?', ops: ['5 días', '10 días', '30 días'], r: 1 },
      { p: 'La documentación del vehículo puede presentarse en formato digital mediante:', ops: ['Cualquier app de fotos', 'La app MiDGT', 'Un correo electrónico a tráfico'], r: 1 },
    ]
  },
  {
    id: 'semaforos', nombre: 'Semáforos y agentes', temaRef: 'Tema 8',
    imgs: [
      { src: 'images/senales_agentes.jpg', cap: 'Señales manuales de los agentes de tráfico' },
      { src: 'images/senales_semaforo.jpg', cap: 'Tipos de semáforos y su significado' },
    ],
    resumen: `<p><strong>Semáforos circulares:</strong></p>
<ul>
<li><strong>Rojo fijo o intermitente:</strong> detenerse obligatoriamente</li>
<li><strong>Amarillo fijo:</strong> detenerse, salvo que no puedas hacerlo con seguridad</li>
<li><strong>Amarillo intermitente:</strong> puedes pasar pero cediendo el paso</li>
<li><strong>Verde:</strong> circular con prioridad, excepto si vas a bloquear el cruce</li>
<li><strong>Flecha verde:</strong> puedes pasar en esa dirección pero cediendo el paso</li>
</ul>
<p>El <strong>semáforo cuadrado</strong> indica si el carril está abierto o cerrado; no regula prioridad entre vehículos.</p>
<p><strong>Agentes de tráfico:</strong></p>
<ul>
<li>Brazo levantado en vertical: se detienen todos los vehículos que se acercan</li>
<li>Brazo o brazos en cruz (horizontal): se detienen los que van a cruzar esa trayectoria</li>
<li>Brazo moviéndose de arriba a abajo: reducir velocidad por ese lado</li>
<li>Apuntan con una luz roja o amarilla: detenerse</li>
</ul>
<p><strong>Silbato:</strong> toque largo = reanudar la marcha; toque corto = detenerse.</p>`,
    preguntas: [
      { p: '¿Qué debes hacer ante un semáforo en amarillo fijo?', ops: ['Acelerar para pasar antes de que cambie', 'Detenerte, salvo que no puedas hacerlo con seguridad', 'Pasar cediendo el paso'], r: 1 },
      { p: '¿Qué significa el semáforo en amarillo intermitente?', ops: ['Detenerse obligatoriamente', 'Pasar con prioridad', 'Pasar cediendo el paso'], r: 2 },
      { p: 'Un semáforo en verde te permite circular, pero con una excepción. ¿Cuál?', ops: ['Si llueve', 'Si hay peatones en la acera', 'Si vas a bloquear el cruce'], r: 2 },
      { p: '¿Para qué sirve el semáforo cuadrado?', ops: ['Regular la prioridad entre vehículos', 'Indicar si el carril está abierto o cerrado', 'Señalizar paso de peatones'], r: 1 },
      { p: 'Un agente levanta el brazo en vertical. ¿Qué deben hacer los vehículos?', ops: ['Solo los que vienen de frente se detienen', 'Todos los que se acercan se detienen', 'Solo los que van a girar se detienen'], r: 1 },
      { p: '¿Qué significa un toque largo de silbato del agente?', ops: ['Detenerse', 'Reanudar la marcha', 'Reducir la velocidad'], r: 1 },
      { p: 'Un semáforo rojo intermitente indica:', ops: ['Precaución, puedes pasar lentamente', 'Detenerse obligatoriamente', 'Ceder el paso y continuar'], r: 1 },
    ]
  },
  {
    id: 'senales', nombre: 'Señales verticales', temaRef: 'Tema 8',
    imgs: [
      { src: 'images/senales_peligro.jpg', cap: 'Señales de peligro — triángulo con borde rojo' },
      { src: 'images/senales_prohibicion.jpg', cap: 'Señales de prohibición y reglamentación' },
      { src: 'images/senales_obligacion.jpg', cap: 'Señales de obligación e indicación' },
    ],
    resumen: `<p>Las señales se organizan por tipo, forma y color:</p>
<ul>
<li><strong>Peligro:</strong> triángulo con borde rojo y fondo blanco. Alertan de un riesgo próximo. Debes reducir la velocidad y extremar la precaución.</li>
<li><strong>Prohibición y restricción:</strong> círculo con fondo blanco y borde rojo. Prohíben o limitan una acción (velocidad máxima, prohibido adelantar, prohibido girar...).</li>
<li><strong>Obligación:</strong> círculo con fondo azul. Imponen una obligación (dirección obligatoria, velocidad mínima, uso de cadenas...).</li>
<li><strong>Indicación:</strong> fondo azul o verde. Informan sobre servicios, rutas o condiciones de la vía.</li>
<li><strong>Fin de prohibición:</strong> círculo con trazo oblicuo. Indican que termina la prohibición anterior.</li>
</ul>
<p><strong>Contradicciones entre señales:</strong> si son de distinto tipo, se obedece la más prioritaria; si son del mismo tipo, la más restrictiva.</p>
<p><strong>Posición de la señal:</strong> si está solo a la derecha, afecta a todo el mundo. Si está solo a la izquierda, afecta a quien gire a la izquierda y vaya de frente.</p>
<p><strong>STOP:</strong> detención obligatoria, independientemente de si hay vehículos. <strong>Ceda el paso:</strong> ceder el paso a los vehículos que ya circulan por la vía a la que accedes, puedes continuar sin detenerte si no hay tráfico.</p>`,
    preguntas: [
      { p: '¿Qué indica una señal triangular con borde rojo?', ops: ['Obligación', 'Peligro', 'Prohibición'], r: 1 },
      { p: '¿Qué forma tienen las señales de obligación?', ops: ['Triángulo rojo', 'Cuadrado azul', 'Círculo azul'], r: 2 },
      { p: 'Una señal circular con fondo blanco y borde rojo indica:', ops: ['Obligación', 'Prohibición o restricción', 'Información'], r: 1 },
      { p: '¿Qué significa la señal de STOP?', ops: ['Reducir la velocidad y seguir si no hay tráfico', 'Detención obligatoria y ceder el paso siempre', 'Solo parar si hay vehículos cruzando'], r: 1 },
      { p: 'Hay dos señales del mismo tipo que se contradicen. ¿Cuál obedeces?', ops: ['La que está a la derecha', 'La más restrictiva', 'La más antigua'], r: 1 },
      { p: '¿Qué indica una señal de "Ceda el paso"?', ops: ['Detenerse siempre obligatoriamente', 'Ceder el paso a los vehículos de la vía a la que accedes', 'Prohibido el acceso'], r: 1 },
      { p: 'Las señales de indicación tienen fondo de color:', ops: ['Rojo', 'Azul o verde', 'Amarillo'], r: 1 },
      { p: 'Una señal está solo a la derecha de la calzada. ¿A quién afecta?', ops: ['Solo a los que giran a la derecha', 'A todo el mundo', 'Solo a los que van de frente'], r: 1 },
    ]
  },
  {
    id: 'marcas', nombre: 'Marcas viales', temaRef: 'Tema 8',
    imgs: [
      { src: 'images/marcas_1.jpg', cap: 'Marcas longitudinales — línea continua y discontinua' },
      { src: 'images/marcas_2.jpg', cap: 'Marcas amarillas y transversales' },
    ],
    resumen: `<p>Las marcas viales son señales pintadas en el suelo que regulan la circulación:</p>
<p><strong>Marcas longitudinales blancas:</strong></p>
<ul>
<li><strong>Línea continua:</strong> prohíbe cruzarla, circular sobre ella o adelantar por la izquierda en doble sentido</li>
<li><strong>Línea discontinua:</strong> puedes adelantar si es seguro</li>
<li><strong>Continua adosada a discontinua:</strong> obedeces la línea que está más cerca de tu carril</li>
<li><strong>Doble discontinua:</strong> carril reversible</li>
<li><strong>Línea más ancha:</strong> carril reservado o especial</li>
</ul>
<p><strong>Marcas transversales:</strong> indican dónde detenerse (línea de stop, paso de peatones).</p>
<p><strong>Marcas amarillas:</strong></p>
<ul>
<li><strong>Línea continua amarilla en el bordillo:</strong> prohibido parar y estacionar</li>
<li><strong>Línea discontinua amarilla o zig-zag:</strong> prohibido estacionar, se permite parar</li>
<li><strong>Cuadrícula amarilla en cruce:</strong> prohibido detenerse sobre ella</li>
</ul>
<p><strong>Cebreado</strong> (rayas oblicuas): zona donde está prohibido parar y estacionar.</p>
<p>Las <strong>flechas de selección de carril</strong> indican el destino obligatorio de ese carril.</p>`,
    preguntas: [
      { p: '¿Qué significa una línea longitudinal continua en la calzada?', ops: ['Puedes adelantar si hay visibilidad', 'Prohibido cruzar o adelantar', 'Indica el carril bici'], r: 1 },
      { p: 'Hay una línea continua adosada a una discontinua. ¿Cuál obedeces?', ops: ['Siempre la continua', 'La que está más cerca de tu carril', 'Siempre la discontinua'], r: 1 },
      { p: '¿Qué indica un cebreado pintado en el suelo?', ops: ['Zona de adelantamiento', 'Prohibido parar y estacionar', 'Paso de peatones'], r: 1 },
      { p: '¿Qué significa una línea amarilla continua en el bordillo?', ops: ['Estacionamiento limitado', 'Prohibido parar y estacionar', 'Prohibido estacionar, se permite parar'], r: 1 },
      { p: 'Una línea amarilla discontinua o zig-zag en el bordillo indica:', ops: ['Prohibido parar y estacionar', 'Prohibido estacionar, se permite parar', 'Solo permitido para taxis'], r: 1 },
      { p: 'Las marcas discontinuas dobles en el centro de la calzada indican:', ops: ['Prohibido adelantar', 'Carril reversible', 'Doble sentido de circulación'], r: 1 },
      { p: '¿Qué indica una flecha de selección de carril pintada en el suelo?', ops: ['Velocidad mínima en ese carril', 'El destino obligatorio del carril', 'Que el carril está cerrado'], r: 1 },
    ]
  },
  {
    id: 'alumbrado', nombre: 'Alumbrado del vehículo', temaRef: 'Tema 7',
    imgs: [
      { src: 'images/luces_1.jpg', cap: 'Tipos de luces y cuándo usarlas' },
      { src: 'images/luces_2.jpg', cap: 'Luces de emergencia y señalización especial' },
      { src: 'images/luces_3.jpg', cap: 'Alumbrado en condiciones adversas' },
    ],
    resumen: `<p>Las luces del vehículo tienen tres funciones: ver, ser visto y señalizar. Los colores son fijos: blanco en la parte delantera, rojo en la trasera, y amarillo en los laterales.</p>
<p>Se encienden obligatoriamente en tres situaciones: entre la puesta y la salida del sol, en condiciones desfavorables de visibilidad, y en túneles o pasos inferiores.</p>
<p>Una vía se considera <strong>insuficientemente iluminada</strong> cuando no se distingue un vehículo oscuro a 50 metros o la matrícula a 10 metros.</p>
<p><strong>Tipos de luces:</strong></p>
<ul>
<li><strong>Luz de posición:</strong> dos blancas delante y dos rojas detrás. Indica presencia y anchura. No puede usarse sola al circular: siempre acompañada de la luz de cruce.</li>
<li><strong>Luz de cruce (cortas):</strong> la luz estándar para circular. No deslumbra. Se puede hacer ráfagas en cualquier vía.</li>
<li><strong>Luz de carretera (largas):</strong> obligatoria en vía interurbana, insuficientemente iluminada, a más de 40 km/h y sin deslumbrar a otros. Prohibida parado o estacionado.</li>
<li><strong>Luz de estacionamiento:</strong> solo al estacionar, de noche, en travesía e insuficientemente iluminada.</li>
<li><strong>Luz de emergencia:</strong> todos los intermitentes a la vez, color amarillo. Para señalizar avería o servicio de urgencia.</li>
<li><strong>Luz V-2:</strong> amarilla, de día y noche, para vehículos especiales que trabajan en la vía, al entrar en autopistas o circulando a menos de 40 km/h. No da prioridad.</li>
</ul>`,
    preguntas: [

    resumen: `<p><strong>Seguridad activa</strong> — previene el accidente: ABS (evita bloqueo de ruedas, permite modificar la trayectoria al frenar), ESP (control de estabilidad), dirección asistida, luces adaptativas.</p>
<p><strong>Seguridad pasiva</strong> — reduce daños cuando ocurre el accidente: airbag, cinturón de seguridad, apoyacabezas, zonas deformables.</p>
<p><strong>Cinturón:</strong> obligatorio para todos los ocupantes. La banda torácica va sobre la clavícula sin rozar el cuello. La abdominal va sobre la cadera y debajo del abdomen. No uses reguladores de presión (provocan efecto submarino). Después de un accidente revísalo por si tiene holguras.</p>
<p><strong>Airbag:</strong> complementario al cinturón, nunca sustituto. Sin cinturón puede ser peligroso. Colócate a 25 cm mínimo.</p>
<p><strong>Menores:</strong> obligatorio SRI (sistema de retención infantil) hasta 135 cm de altura. Van preferentemente en asientos traseros. Sistema ISOFIX proporciona mejor anclaje.</p>
<p><strong>Neumáticos:</strong> cambiarlos cuando el dibujo de la banda de rodadura sea inferior a 1,6 mm. Presión: comprobar una vez al mes, en frío, según fabricante. Poca presión → desgaste en laterales; mucha presión → desgaste en el centro.</p>

    resumen: `<p><strong>Tasas de alcoholemia:</strong></p>

</ul>
<p>El alcohol alcanza su nivel más alto <strong>entre 30 y 90 minutos</strong> después de la última copa. Se elimina más lentamente durante el sueño.</p>
<p><strong>Efectos del alcohol:</strong> aumenta el tiempo de reacción, la somnolencia, la fatiga y el riesgo aceptado; produce efecto túnel (estrecha el campo visual); distorsiona la percepción de señales, distancias y velocidades; genera falsa sensación de euforia y seguridad.</p>
<p><strong>Las drogas están prohibidas</strong> en cualquier cantidad al conducir:</p>
<ul>
<li>Cannabis: altera la percepción, aumenta el tiempo de reacción y la somnolencia</li>

<li>Anfetaminas: impulsividad, impaciencia, disminuye la sensación de fatiga</li>
<li>LSD: alteración emocional hasta 12 horas</li>
</ul>
<p><strong>Fatiga:</strong> causa principal de accidentes. Las horas de más riesgo son de 3:00 a 5:00 de la madrugada y de 14:00 a 16:00 de la tarde. Descansa cada 2 horas o 200 km.</p>`,
    preguntas: [
      { p: '¿Cuál es la tasa de alcohol permitida para un conductor general en sangre?', ops: ['0,3 g/l', '0,5 g/l', '0,8 g/l'], r: 1 },
      { p: '¿Cuál es el límite para conductores noveles?', ops: ['0,5 g/l', '0,3 g/l', '0,0 g/l'], r: 1 },
      { p: '¿Cuándo alcanza el alcohol su nivel más alto en sangre?', ops: ['Inmediatamente al beber', 'Entre 30 y 90 minutos después de la última copa', 'A las 3 horas de beber'], r: 1 },
      { p: '¿Está permitido conducir habiendo consumido cannabis?', ops: ['Sí, si solo fue una vez', 'No, está prohibido en cualquier cantidad', 'Solo si no se nota el efecto'], r: 1 },
      { p: '¿Qué efecto tiene el alcohol sobre el campo visual?', ops: ['Lo amplía', 'Lo estrecha (efecto túnel)', 'No tiene efecto sobre la visión'], r: 1 },
      { p: 'La tasa de 0,25 mg/l en aire espirado equivale a:', ops: ['0,5 g/l en sangre', '0,3 g/l en sangre', '0,8 g/l en sangre'], r: 0 },
      { p: '¿Qué droga provoca agresividad, competitividad y mayor aceptación del riesgo?', ops: ['Cannabis', 'Cocaína', 'Anfetaminas'], r: 1 },
    ]
  },
  {
    id: 'riesgo', nombre: 'Situaciones de riesgo', temaRef: 'Tema 14',
    imgs: [
      { src: 'images/conductor_1.jpg', cap: 'Conducción preventiva — visión, anticipación y espacio' },
    ],
    resumen: `<p><strong>Con lluvia:</strong> la calzada está más deslizante con las primeras gotas. La visibilidad y la adherencia disminuyen. La distancia de frenado se duplica. No se recomienda la luz de carretera (las gotas reflejan). Usa limpiaparabrisas y dispositivos antivaho.</p>
<p><strong>Aquaplaning:</strong> el neumático no es capaz de evacuar el agua y pierde contacto con el suelo. Causas: velocidad excesiva o mal estado del neumático. No frenes bruscamente ni gires el volante.</p>
<p><strong>Con nieve o hielo:</strong> la distancia de frenado puede multiplicarse por 10. Conduce con suavidad, usa marchas largas excepto en bajadas, sal en 2ª o 3ª marcha. Las cadenas van en las ruedas motrices (conveniente en todas).</p>
<p><strong>Con niebla:</strong> humedece la calzada, reduce la visibilidad y aumenta la distancia de frenado. Aumenta la distancia de seguridad, modera la velocidad y evita adelantamientos. Observa las marcas viales.</p>
<p><strong>Con viento:</strong> el frontal aumenta el consumo; el trasero aumenta la distancia de frenado; el lateral puede expulsarte de la vía. Cuidado al cruzarse con vehículos grandes.</p>
<p><strong>Derrapaje:</strong> por delante → girar el volante al lado contrario. Por detrás → girar al mismo lado.</p>
<p><strong>Deslumbramiento:</strong> desvia la vista sin modificar la trayectoria, modera la velocidad, detente si es necesario.</p>`,
    preguntas: [
      { p: 'Con lluvia, ¿cuánto se multiplica la distancia de frenado?', ops: ['Se mantiene igual', 'Se duplica', 'Se triplica'], r: 1 },
      { p: '¿Cuándo está la calzada más deslizante con la lluvia?', ops: ['Cuando lleva mucho tiempo lloviendo', 'Con las primeras gotas', 'Solo cuando hay charcos visibles'], r: 1 },
      { p: '¿Qué es el aquaplaning?', ops: ['Dificultad de dirección por viento lateral', 'El neumático pierde contacto con el suelo al no evacuar el agua', 'Deslumbramiento por el reflejo del agua'], r: 1 },
      { p: 'Con nieve o hielo, la distancia de frenado puede multiplicarse por:', ops: ['2', '5', '10'], r: 2 },
      { p: '¿Dónde se colocan las cadenas?', ops: ['En las ruedas traseras siempre', 'En las ruedas motrices', 'En las 4 ruedas siempre obligatoriamente'], r: 1 },
      { p: 'Si el vehículo derrapa por la parte delantera, ¿qué debes hacer con el volante?', ops: ['Girar al mismo lado del derrape', 'Girar al lado contrario del derrape', 'No tocar el volante'], r: 1 },
      { p: 'Ante un deslumbramiento, ¿qué debes hacer?', ops: ['Frenar bruscamente', 'Desviar la vista sin modificar la trayectoria y moderar la velocidad', 'Poner las luces largas para avisar'], r: 1 },
    ]
  },
  {
    id: 'auxilios', nombre: 'Primeros auxilios y accidentes', temaRef: 'Tema 16',
    imgs: [
      { src: 'images/accidentes_1.jpg', cap: 'Grupos de riesgo en accidentes de tráfico' },
      { src: 'images/auxilios_1.jpg', cap: 'Protocolo PAS y primeros auxilios' },
      { src: 'images/auxilios_2.jpg', cap: 'RCP y posición lateral de seguridad' },
    ],
    resumen: `<p><strong>Ante un accidente: P.A.S.</strong> — Proteger, Avisar, Socorrer. Llama al 112.</p>
<p><strong>Normas generales:</strong></p>
<ul>
<li>Estacionar fuera de la calzada y apagar el motor</li>
<li>No modificar el estado de las cosas (para la investigación)</li>
<li>Atender primero a los heridos inconscientes</li>
<li>Como norma general, no mover ni sacar al herido del vehículo</li>
<li>No quitar el casco al motorista (salvo riesgo de asfixia u otras excepciones)</li>
<li>No dar de comer ni beber al herido</li>
<li>Tapar a los heridos para mantenerles el calor</li>
</ul>
<p><strong>Protocolo de socorro:</strong> comprobar consciencia → abrir vía aérea (maniobra frente-mentón) → ver, oír, sentir (máximo 10 segundos) → si no respira: RCP.</p>
<p><strong>RCP adultos:</strong> 30 compresiones + 2 insuflaciones. <strong>Niños:</strong> primero 5 insuflaciones de rescate, luego 15 compresiones + 2 insuflaciones.</p>
<p><strong>Herido inconsciente que respira:</strong> posición lateral de seguridad (para evitar asfixia si vomita).</p>
<p>La <strong>"hora de oro"</strong> es el período inmediatamente posterior al accidente, donde los primeros auxilios salvan más vidas.</p>
<p><strong>Factor humano</strong> es la causa del 70-90% de los accidentes (distracciones, alcohol, velocidad). Los accidentes son más frecuentes en vía urbana pero más graves en vía interurbana.</p>`,
    preguntas: [
      { p: '¿Qué significa PAS en un accidente?', ops: ['Parar, Avisar, Señalizar', 'Proteger, Avisar, Socorrer', 'Parar, Atender, Señalizar'], r: 1 },
      { p: '¿Cuál es el número de emergencias en España?', ops: ['091', '061', '112'], r: 2 },
      { p: 'Como norma general, ¿se debe sacar al herido del vehículo?', ops: ['Sí, siempre lo antes posible', 'No, salvo excepciones justificadas', 'Depende de si está consciente'], r: 1 },
      { p: '¿Cuántas compresiones y ventilaciones tiene la RCP en adultos?', ops: ['15 compresiones y 2 ventilaciones', '30 compresiones y 2 ventilaciones', '30 compresiones y 5 ventilaciones'], r: 1 },
      { p: 'Un herido está inconsciente pero respira. ¿Qué posición le colocas?', ops: ['Boca arriba con las piernas elevadas', 'Posición lateral de seguridad', 'Sentado con la cabeza hacia atrás'], r: 1 },
      { p: '¿Cuándo puedes quitarle el casco a un motorista accidentado?', ops: ['Siempre, es lo primero que hay que hacer', 'Nunca bajo ningún concepto', 'Solo si hay riesgo de asfixia u otras excepciones'], r: 2 },
      { p: '¿Dónde se producen más accidentes de tráfico?', ops: ['En vía interurbana', 'En vía urbana', 'En autopistas y autovías'], r: 1 },
    ]
  }
];

const TODAS = TEMAS.flatMap(t => t.preguntas.map(p => ({ ...p, temaId: t.id, temaRef: t.temaRef, temaNombre: t.nombre })));

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const SVG = {
  clock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  x: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  arrow: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`,
  chevron: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
  external: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,
  reset: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.01-6"/></svg>`,
  exam: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  practice: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>`,
  book: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`,
};

let state = { view: 'menu' };

function docLink(temaRef, temaNombre) {
  return `<a href="${DOC_URL}" target="_blank" class="doc-link">${SVG.external} Repasar ${temaRef}: ${temaNombre}</a>`;
}

function render() {
  const app = document.getElementById('app');
  const views = { menu: renderMenu, examen: renderExamen, 'practica-selector': renderPracticaSelector, practica: renderPractica, temas: renderTemas, tema: renderTema, resultado: renderResultado };
  app.innerHTML = (views[state.view] || renderMenu)();
  bindEvents();
  window.scrollTo(0, 0);
}

function renderMenu() {
  return `<div class="header-pad">
    <h1>Teórico DGT</h1>
    <p class="subtitle">Permiso B · ${TODAS.length} preguntas · ${TEMAS.length} temas</p>
    <button class="menu-item" data-action="start-examen"><div class="menu-icon">${SVG.exam}</div><div><div class="menu-label">Examen simulado</div><div class="menu-desc">30 preguntas · 40 min · máx. 3 fallos</div></div></button>
    <button class="menu-item" data-action="start-practica-selector"><div class="menu-icon">${SVG.practice}</div><div><div class="menu-label">Práctica libre</div><div class="menu-desc">Elige tema o practica todo</div></div></button>
    <button class="menu-item" data-action="start-temas"><div class="menu-icon">${SVG.book}</div><div><div class="menu-label">Revisar temas</div><div class="menu-desc">Teoría con imágenes y preguntas</div></div></button>
  </div>`;
}

function renderPracticaSelector() {
  return `<div class="topbar"><button class="back-btn" data-action="menu">${SVG.arrow} Volver</button><div></div></div>
  <h2 style="margin-bottom:1rem;">¿Qué quieres practicar?</h2>
  <button class="selector-row" data-action="start-practica" data-tema-id="all"><span style="font-size:15px;font-weight:500;color:var(--text);">Todos los temas</span><span style="font-size:13px;color:var(--text2);">${TODAS.length} preguntas</span></button>
  ${TEMAS.map(t => `<button class="selector-row" data-action="start-practica" data-tema-id="${t.id}"><span style="font-size:15px;color:var(--text);">${t.nombre}</span><span style="font-size:13px;color:var(--text2);">${t.preguntas.length} preg.</span></button>`).join('')}`;
}

function renderPractica() {
  const { preguntas, actual, respondida, seleccion, aciertos, fallos } = state;
  const q = preguntas[actual];
  return `<div class="topbar"><button class="back-btn" data-action="start-practica-selector">${SVG.arrow} Salir</button>
    <div class="topbar-right"><span style="color:var(--success-text);">✓ ${aciertos}</span><span style="color:var(--danger-text);">✗ ${fallos}</span><span style="font-size:11px;color:var(--text3);">${q.temaRef}</span></div></div>
  <p class="question-text">${q.p}</p>
  <div>${q.ops.map((o, i) => { let cls = 'option-btn'; if (respondida) { if (i === q.r) cls += ' option-correct'; else if (i === seleccion && seleccion !== q.r) cls += ' option-wrong'; } return `<button class="${cls}" data-action="resp-practica" data-idx="${i}" ${respondida ? 'disabled' : ''}>${o}</button>`; }).join('')}</div>
  ${respondida && seleccion !== q.r ? docLink(q.temaRef, q.temaNombre) : ''}
  ${respondida ? `<button class="next-btn" data-action="next-practica">Siguiente pregunta</button>` : ''}`;
}

function renderExamen() {
  const { preguntas, actual, respuestas, tiempo } = state;
  const q = preguntas[actual];
  const fallos = respuestas.filter((r, i) => r !== null && r !== preguntas[i].r).length;
  const mins = Math.floor(tiempo / 60), secs = String(tiempo % 60).padStart(2, '0');
  const pct = ((actual + 1) / preguntas.length * 100).toFixed(0);
  return `<div class="topbar"><button class="back-btn" data-action="menu">${SVG.arrow} Salir</button>
    <div class="topbar-right"><span id="timer-display">${SVG.clock} ${mins}:${secs}</span><span style="color:${fallos >= 3 ? 'var(--danger-text)' : 'var(--text2)'}">${SVG.x} ${fallos}/3</span><span>${actual + 1}/${preguntas.length}</span></div></div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  <p class="question-text">${q.p}</p>
  <div id="opciones">${q.ops.map((o, i) => `<button class="option-btn" data-action="resp-examen" data-idx="${i}">${o}</button>`).join('')}</div>`;
}

function renderTemas() {
  return `<div class="topbar"><button class="back-btn" data-action="menu">${SVG.arrow} Volver</button><div></div></div>
  <h2 style="margin-bottom:1rem;">Temas</h2>
  ${TEMAS.map(t => `<button class="tema-row" data-action="ver-tema" data-id="${t.id}"><span style="font-size:15px;color:var(--text);">${t.nombre}</span><span style="font-size:13px;color:var(--text2);">${t.preguntas.length} preg. ${SVG.chevron.replace('svg', 'svg style="width:14px;height:14px;display:inline;vertical-align:-3px;"')}</span></button>`).join('')}`;
}

function renderTema() {
  const tema = TEMAS.find(t => t.id === state.temaId);
  const { respondidas } = state;
  const todasRespondidas = Object.keys(respondidas).length === tema.preguntas.length;
  return `<div class="topbar"><button class="back-btn" data-action="start-temas">${SVG.arrow} Temas</button>
    ${todasRespondidas ? `<button class="reset-btn" data-action="reset-tema">${SVG.reset} Reiniciar</button>` : '<div></div>'}</div>
  <h2 style="margin-bottom:0.25rem;">${tema.nombre}</h2>
  <p style="font-size:13px;color:var(--text2);margin-bottom:1.25rem;">${tema.temaRef} — Manual DGT</p>
  <div class="section-title">Teoría</div>
  <div class="resumen-box" style="font-size:14px;line-height:1.8;">${tema.resumen}</div>
  ${tema.imgs.map(img => `<img src="${img.src}" alt="${img.cap}" class="tema-img" loading="lazy"><p class="tema-img-caption">${img.cap}</p>`).join('')}
  <div class="section-title" style="margin-top:1.5rem;">Preguntas</div>
  ${tema.preguntas.map((q, qi) => { const resp = respondidas[qi]; return `<div class="tema-q"><p class="tema-q-text">${q.p}</p>${q.ops.map((o, oi) => { let cls = 'tema-opt'; if (resp !== undefined) { if (oi === q.r) cls += ' option-correct'; else if (oi === resp && resp !== q.r) cls += ' option-wrong'; } return `<button class="${cls}" ${resp !== undefined ? 'disabled' : ''} data-action="resp-tema" data-qi="${qi}" data-oi="${oi}">${o}</button>`; }).join('')}${resp !== undefined && resp !== q.r ? docLink(tema.temaRef, tema.nombre) : ''}</div>`; }).join('')}`;
}

function renderResultado() {
  const { preguntas, respuestas, tiempoTotal } = state;
  const fallos = respuestas.filter((r, i) => r !== null && r !== preguntas[i].r).length;
  const aciertos = respuestas.filter((r, i) => r === preguntas[i].r).length;
  const aprobado = fallos <= 3;
  const mins = Math.floor(tiempoTotal / 60), secs = String(tiempoTotal % 60).padStart(2, '0');
  const errores = preguntas.reduce((acc, q, i) => { if (respuestas[i] !== null && respuestas[i] !== q.r) acc.push({ q, seleccion: respuestas[i] }); return acc; }, []);
  return `<div style="padding-top:1.25rem;">
    <div class="result-icon">${aprobado ? '✅' : '❌'}</div>
    <h2 class="result-title" style="color:${aprobado ? 'var(--success-text)' : 'var(--danger-text)'};">${aprobado ? 'Aprobado' : 'Suspenso'}</h2>
    <p class="result-sub" style="margin-bottom:1.5rem;">${aprobado ? 'Has superado el umbral mínimo.' : 'Has cometido más de 3 errores.'}</p>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Aciertos</div><div class="stat-value">${aciertos}</div></div>
      <div class="stat-card"><div class="stat-label">Fallos</div><div class="stat-value ${fallos > 3 ? 'color-danger' : ''}">${fallos}</div></div>
      <div class="stat-card"><div class="stat-label">Tiempo</div><div class="stat-value">${mins}:${secs}</div></div>
    </div>
    <button class="next-btn" data-action="menu">Volver al menú</button>
    ${errores.length > 0 ? `<div class="section-title" style="margin-top:1.75rem;">Preguntas falladas</div>${errores.map(({ q, seleccion }) => `<div class="tema-q" style="margin-bottom:12px;"><p class="tema-q-text">${q.p}</p>${q.ops.map((o, oi) => { let cls = 'tema-opt'; if (oi === q.r) cls += ' option-correct'; else if (oi === seleccion) cls += ' option-wrong'; return `<button class="${cls}" disabled>${o}</button>`; }).join('')}${docLink(q.temaRef, q.temaNombre)}</div>`).join('')}` : `<p style="font-size:14px;color:var(--text2);text-align:center;margin-top:1.5rem;">Sin errores. ¡Perfecto!</p>`}
  </div>`;
}

function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => el.addEventListener('click', handleAction));
}

function handleAction(e) {
  const btn = e.currentTarget, action = btn.dataset.action;
  if (action === 'menu') { if (state.timer) clearInterval(state.timer); state = { view: 'menu' }; }
  else if (action === 'start-examen') {
    const preguntas = shuffle(TODAS).slice(0, 30);
    const timer = setInterval(() => {
      state.tiempo++;
      if (state.tiempo >= 2400) { terminarExamen(); return; }
      const el = document.getElementById('timer-display');
      if (el) { const m = Math.floor(state.tiempo / 60), s = String(state.tiempo % 60).padStart(2, '0'); el.innerHTML = `${SVG.clock} ${m}:${s}`; }
    }, 1000);
    state = { view: 'examen', preguntas, actual: 0, respuestas: new Array(30).fill(null), tiempo: 0, timer };
  }
  else if (action === 'start-practica-selector') { if (state.timer) clearInterval(state.timer); state = { view: 'practica-selector' }; }
  else if (action === 'start-practica') {
    const temaId = btn.dataset.temaId;
    const pool = temaId === 'all' ? TODAS : TODAS.filter(q => q.temaId === temaId);
    state = { view: 'practica', preguntas: shuffle(pool), actual: 0, respondida: false, seleccion: null, aciertos: 0, fallos: 0 };
  }
  else if (action === 'start-temas') { if (state.timer) clearInterval(state.timer); state = { view: 'temas' }; }
  else if (action === 'ver-tema') { state = { view: 'tema', temaId: btn.dataset.id, respondidas: {} }; }
  else if (action === 'reset-tema') { state = { view: 'tema', temaId: state.temaId, respondidas: {} }; }
  else if (action === 'resp-examen') {
    const idx = parseInt(btn.dataset.idx);
    state.respuestas[state.actual] = idx;
    if (state.actual >= state.preguntas.length - 1) { terminarExamen(); return; }
    state.actual++;
  }
  else if (action === 'resp-practica') { const idx = parseInt(btn.dataset.idx); state.seleccion = idx; state.respondida = true; if (idx === state.preguntas[state.actual].r) state.aciertos++; else state.fallos++; }
  else if (action === 'next-practica') { state.actual = (state.actual + 1) % state.preguntas.length; state.respondida = false; state.seleccion = null; }
  else if (action === 'resp-tema') { const qi = parseInt(btn.dataset.qi), oi = parseInt(btn.dataset.oi); state.respondidas = { ...state.respondidas, [qi]: oi }; }
  render();
}

function terminarExamen() {
  if (state.timer) clearInterval(state.timer);
  state.tiempoTotal = state.tiempo;
  state.view = 'resultado';
  render();
}

render();
</script>
</body>
</html>
