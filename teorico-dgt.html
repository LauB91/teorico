<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Teórico DGT — Permiso B</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f4;
    --bg3: #efefed;
    --text: #1a1a18;
    --text2: #6b6b68;
    --text3: #9b9b97;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --success-bg: #eaf3de;
    --success-text: #3b6d11;
    --success-border: #639922;
    --danger-bg: #fcebeb;
    --danger-text: #a32d2d;
    --danger-border: #e24b4a;
    --radius: 10px;
    --radius-lg: 14px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #f0efe9;
      --text2: #a0a09a;
      --text3: #707068;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --success-bg: #173404;
      --success-text: #c0dd97;
      --success-border: #3b6d11;
      --danger-bg: #501313;
      --danger-text: #f7c1c1;
      --danger-border: #a32d2d;
    }
  }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.5;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
  }
  #app {
    max-width: 520px;
    margin: 0 auto;
    min-height: 100dvh;
    padding: 0 1rem calc(1.5rem + var(--safe-bottom));
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 0 1.25rem;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 1.25rem;
  }
  .back-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: var(--text2);
    padding: 6px 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .topbar-right {
    display: flex;
    gap: 14px;
    font-size: 13px;
    color: var(--text2);
    align-items: center;
  }
  .topbar-right span { display: flex; align-items: center; gap: 4px; }
  .topbar-right svg { width: 14px; height: 14px; }
  h1 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  h2 { font-size: 18px; font-weight: 600; color: var(--text); }
  h3 { font-size: 15px; font-weight: 600; color: var(--text); }
  .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 2rem; }
  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
  }
  .menu-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 1rem 1.25rem;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    cursor: pointer;
    text-align: left;
    width: 100%;
    transition: background 0.15s;
    margin-bottom: 10px;
  }
  .menu-item:active { background: var(--bg2); }
  .menu-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius);
    background: var(--bg2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .menu-icon svg { width: 20px; height: 20px; color: var(--text2); }
  .menu-label { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .menu-desc { font-size: 13px; color: var(--text2); }
  .progress-bar {
    height: 4px;
    background: var(--bg2);
    border-radius: 2px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--text);
    border-radius: 2px;
    transition: width 0.3s;
  }
  .question-text {
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 1.5rem;
    line-height: 1.55;
  }
  .option-btn {
    display: block;
    width: 100%;
    padding: 0.875rem 1rem;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    text-align: left;
    font-size: 15px;
    color: var(--text);
    margin-bottom: 8px;
    transition: background 0.15s, border-color 0.15s;
    line-height: 1.4;
  }
  .option-btn:active:not(:disabled) { background: var(--bg2); }
  .option-btn:disabled { cursor: default; }
  .option-correct { background: var(--success-bg) !important; border: 1.5px solid var(--success-border) !important; color: var(--success-text) !important; }
  .option-wrong { background: var(--danger-bg) !important; border: 1.5px solid var(--danger-border) !important; color: var(--danger-text) !important; }
  .next-btn {
    width: 100%;
    padding: 0.875rem;
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 15px;
    color: var(--text);
    margin-top: 1.25rem;
    transition: background 0.15s;
  }
  .next-btn:active { background: var(--bg2); }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 1.5rem 0;
  }
  .stat-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 0.875rem;
    text-align: center;
  }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 600; color: var(--text); }
  .result-icon {
    font-size: 52px;
    text-align: center;
    margin: 1.5rem 0 0.75rem;
  }
  .result-title {
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 6px;
  }
  .result-sub {
    font-size: 14px;
    color: var(--text2);
    text-align: center;
    margin-bottom: 0;
  }
  .tema-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.875rem 1.25rem;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    cursor: pointer;
    width: 100%;
    text-align: left;
    margin-bottom: 8px;
    transition: background 0.15s;
  }
  .tema-row:active { background: var(--bg2); }
  .tema-nombre { font-size: 15px; color: var(--text); }
  .tema-count { font-size: 13px; color: var(--text2); }
  .resumen-box {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 1rem;
    margin-bottom: 1.5rem;
    font-size: 14px;
    color: var(--text2);
    line-height: 1.7;
  }
  .tema-q {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 12px;
  }
  .tema-q-text { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 0.75rem; line-height: 1.5; }
  .tema-opt {
    display: block;
    width: 100%;
    padding: 0.5rem 0.875rem;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    text-align: left;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 6px;
    transition: background 0.15s;
  }
  .tema-opt:active:not(:disabled) { background: var(--bg3); }
  .tema-opt:disabled { cursor: default; }
  .color-danger { color: var(--danger-text) !important; }
  .header-pad { padding-top: 1.25rem; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const TEMAS = [
  {
    id: 'senales',
    nombre: 'Señales de tráfico',
    resumen: 'Las señales de tráfico se dividen en varias categorías. Las señales de peligro (triángulo rojo) alertan de un riesgo próximo. Las señales de reglamentación indican obligaciones o prohibiciones: las de prioridad (ceda el paso, stop), las de prohibición (fondo blanco con borde rojo) y las de obligación (fondo azul circular). Las señales de indicación (fondo azul o verde) dan información sobre servicios o rutas. Las marcas viales horizontales también forman parte de la señalización: línea continua = prohibido cruzar, línea discontinua = permitido si es seguro.',
    preguntas: [
      { p: '¿Qué indica una señal triangular con borde rojo?', ops: ['Obligación', 'Peligro', 'Prohibición'], r: 1 },
      { p: '¿Qué significa una línea longitudinal continua en la calzada?', ops: ['Puedes adelantar si hay visibilidad', 'Prohibido cruzar o adelantar', 'Indica el carril bici'], r: 1 },
      { p: '¿Qué forma tienen las señales de obligación?', ops: ['Triángulo rojo', 'Cuadrado azul', 'Círculo azul'], r: 2 },
      { p: 'Una señal circular con fondo blanco y borde rojo indica:', ops: ['Obligación', 'Prohibición o restricción', 'Información'], r: 1 },
      { p: '¿Qué significa la señal de STOP?', ops: ['Reducir la velocidad y seguir', 'Detención obligatoria y ceder el paso', 'Solo parar si hay vehículos'], r: 1 },
      { p: '¿Qué indica una señal de "Ceda el paso"?', ops: ['Detenerse siempre obligatoriamente', 'Ceder el paso a los vehículos de la vía a la que se accede', 'Prohibido el acceso'], r: 1 },
      { p: 'Las señales de indicación tienen fondo de color:', ops: ['Rojo', 'Azul o verde', 'Amarillo'], r: 1 },
      { p: '¿Qué indica una flecha blanca pintada en el suelo apuntando hacia adelante?', ops: ['Carril obligatorio de giro', 'Sentido de circulación obligatorio en ese carril', 'Zona de adelantamiento'], r: 1 },
    ]
  },
  {
    id: 'velocidad',
    nombre: 'Velocidades y límites',
    resumen: 'Los límites genéricos de velocidad en España son: autopistas y autovías 120 km/h, carreteras convencionales con arcén ≥1,5 m hasta 90 km/h, vías urbanas 50 km/h y zonas residenciales 20 km/h. Los conductores noveles (menos de 2 años de permiso) tienen un límite reducido de 100 km/h en autopistas y autovías. La velocidad mínima en autopistas es la mitad del límite máximo. En condiciones adversas (lluvia, niebla, hielo) se debe reducir la velocidad independientemente del límite señalizado.',
    preguntas: [
      { p: '¿Cuál es el límite de velocidad genérico en autopistas para un turismo?', ops: ['100 km/h', '110 km/h', '120 km/h'], r: 2 },
      { p: '¿Cuál es el límite de velocidad en vías urbanas si no hay señal?', ops: ['30 km/h', '50 km/h', '60 km/h'], r: 1 },
      { p: '¿Qué velocidad máxima tienen los conductores noveles en autopista?', ops: ['90 km/h', '100 km/h', '120 km/h'], r: 1 },
      { p: '¿Cuál es el límite en zonas de coexistencia y áreas residenciales?', ops: ['10 km/h', '20 km/h', '30 km/h'], r: 1 },
      { p: '¿Cuál es el límite genérico en carretera convencional con arcén ≥1,5 m?', ops: ['80 km/h', '90 km/h', '100 km/h'], r: 1 },
      { p: 'La velocidad mínima en autopista es:', ops: ['La mitad del límite máximo permitido', '60 km/h siempre', '40 km/h'], r: 0 },
      { p: 'En una vía urbana con señal de 30 km/h, ¿cuál es el límite máximo?', ops: ['50 km/h porque es vía urbana', '30 km/h según la señal', '20 km/h por precaución'], r: 1 },
      { p: 'Ante niebla densa, ¿qué debes hacer con la velocidad?', ops: ['Mantener la velocidad para no interrumpir el tráfico', 'Reducirla aunque estés dentro del límite', 'Acelerar para salir antes de la zona de niebla'], r: 1 },
    ]
  },
  {
    id: 'prioridad',
    nombre: 'Prioridad de paso',
    resumen: 'La norma general es que en intersecciones sin señalizar, tienen prioridad los vehículos que circulan por la derecha. Los vehículos en una vía principal tienen prioridad sobre los que acceden desde una secundaria. Los vehículos de emergencia con señales acústicas y luminosas activadas tienen prioridad absoluta. Los peatones tienen prioridad en pasos de peatones. En rotondas, los vehículos dentro de la glorieta tienen prioridad sobre los que pretenden entrar, salvo señalización en contrario.',
    preguntas: [
      { p: 'En una intersección sin señalizar, ¿quién tiene prioridad?', ops: ['El que llega primero', 'El vehículo que viene por la derecha', 'El vehículo más grande'], r: 1 },
      { p: 'En una rotonda, ¿quién tiene prioridad?', ops: ['El vehículo que entra en la rotonda', 'El vehículo que ya circula dentro', 'El que va más rápido'], r: 1 },
      { p: 'Un vehículo de emergencia con sirena y luces activadas tiene:', ops: ['Prioridad solo en vías urbanas', 'Prioridad absoluta de paso', 'La misma prioridad que los demás'], r: 1 },
      { p: 'En un paso de peatones sin semáforo, ¿quién tiene prioridad?', ops: ['El vehículo', 'El peatón', 'Depende de quién llega primero'], r: 1 },
      { p: 'Un vehículo sale de un aparcamiento a la calzada, ¿quién tiene prioridad?', ops: ['El vehículo que sale', 'Los vehículos que circulan por la calzada', 'El peatón siempre'], r: 1 },
      { p: '¿Tienen prioridad los ciclistas en un carril bici señalizado que cruza la calzada?', ops: ['No, siempre ceden el paso', 'Sí, si está debidamente señalizado', 'Solo de noche'], r: 1 },
      { p: 'Un autobús urbano señaliza su incorporación al tráfico desde una parada, ¿debes cederle el paso?', ops: ['No, tiene que esperar un hueco', 'Sí, fuera de autopista y autovía', 'Solo si va vacío'], r: 1 },
    ]
  },
  {
    id: 'alcohol',
    nombre: 'Alcohol, drogas y medicamentos',
    resumen: 'La tasa de alcoholemia permitida para conductores en general es de 0,5 g/l en sangre (0,25 mg/l en aire espirado). Para conductores noveles y profesionales, el límite es 0,3 g/l en sangre (0,15 mg/l en aire). El alcohol aumenta el tiempo de reacción, reduce la concentración y distorsiona la percepción. Las drogas como el cannabis, la cocaína y las anfetaminas están prohibidas en cualquier cantidad. Algunos medicamentos también afectan a la conducción y deben indicarlo el médico o el prospecto.',
    preguntas: [
      { p: '¿Cuál es la tasa de alcohol permitida para un conductor general en sangre?', ops: ['0,3 g/l', '0,5 g/l', '0,8 g/l'], r: 1 },
      { p: '¿Cuál es el límite para conductores noveles (menos de 2 años)?', ops: ['0,5 g/l', '0,3 g/l', '0,0 g/l'], r: 1 },
      { p: 'El alcohol en la conducción...', ops: ['Mejora los reflejos', 'Reduce el tiempo de reacción y la concentración', 'Solo afecta si se supera 1 g/l'], r: 1 },
      { p: '¿Está permitido conducir habiendo consumido cannabis?', ops: ['Sí, si solo fue una vez', 'No, está prohibido en cualquier cantidad', 'Solo si no se nota el efecto'], r: 1 },
      { p: 'La tasa de 0,25 mg/l en aire espirado equivale aproximadamente a:', ops: ['0,5 g/l en sangre', '0,3 g/l en sangre', '0,8 g/l en sangre'], r: 0 },
      { p: 'Si tomas medicamentos que producen somnolencia, ¿puedes conducir?', ops: ['Sí, si te sientes bien', 'No, está prohibido conducir bajo sus efectos', 'Solo en trayectos cortos'], r: 1 },
      { p: '¿Qué efecto tiene el alcohol sobre la visión?', ops: ['Mejora la visión nocturna', 'Estrecha el campo visual y reduce la percepción', 'No tiene efecto sobre la visión'], r: 1 },
    ]
  },
  {
    id: 'seguridad',
    nombre: 'Seguridad activa y pasiva',
    resumen: 'La seguridad activa incluye sistemas que previenen el accidente: frenos ABS, control de estabilidad (ESP), dirección asistida, luces. La seguridad pasiva actúa cuando el accidente ya ocurre para minimizar daños: airbags, cinturón de seguridad, zonas deformables, apoyacabezas. El cinturón es obligatorio para todos los ocupantes. Los menores de 135 cm deben usar sistemas de retención homologados (SRI) adaptados a su talla y peso, y deben ir en los asientos traseros. El airbag sin cinturón puede resultar letal.',
    preguntas: [
      { p: '¿Qué sistema pertenece a la seguridad activa?', ops: ['Airbag', 'Cinturón de seguridad', 'Sistema ABS'], r: 2 },
      { p: '¿El cinturón de seguridad es obligatorio para...?', ops: ['Solo el conductor', 'Solo los adultos', 'Todos los ocupantes del vehículo'], r: 2 },
      { p: 'Un niño de 120 cm de altura, ¿dónde debe ir?', ops: ['Delante con airbag desactivado', 'Detrás con SRI homologado adecuado', 'Puede elegir su asiento'], r: 1 },
      { p: '¿Qué es el ESP?', ops: ['Un sistema de freno de emergencia', 'Un sistema de control de estabilidad', 'Un tipo de airbag'], r: 1 },
      { p: 'El airbag sin cinturón de seguridad...', ops: ['Es igual de efectivo', 'Puede resultar más peligroso', 'No se activa'], r: 1 },
      { p: '¿Qué es la seguridad pasiva?', ops: ['Sistemas que evitan el accidente', 'Sistemas que reducen daños cuando el accidente ocurre', 'La señalización de emergencia'], r: 1 },
      { p: 'Los apoyacabezas forman parte de la seguridad...', ops: ['Activa', 'Pasiva', 'No forman parte de ninguna'], r: 1 },
    ]
  },
  {
    id: 'adelantamiento',
    nombre: 'Adelantamiento y distancia',
    resumen: 'Antes de adelantar debes: asegurarte de que la vía por delante está libre, señalizar con el intermitente izquierdo, mantener una distancia lateral suficiente del adelantado, y reincorporarte al carril derecho sin cortar. Está prohibido adelantar en curvas o cambios de rasante sin visibilidad, en pasos de nivel, en pasos de peatones y cuando hay línea continua. Al adelantar a ciclistas, la distancia lateral mínima es de 1,5 metros. La distancia de seguridad debe permitir detenerse ante una frenada brusca del vehículo precedente.',
    preguntas: [
      { p: '¿Cuál es la distancia lateral mínima al adelantar a un ciclista?', ops: ['0,5 metros', '1 metro', '1,5 metros'], r: 2 },
      { p: '¿Puedes adelantar en un cambio de rasante sin visibilidad?', ops: ['Sí, si el carril contrario está libre', 'No, está prohibido', 'Solo si llevas luces largas'], r: 1 },
      { p: '¿Qué debes hacer antes de adelantar?', ops: ['Acelerar para hacerlo rápido', 'Asegurarte de que la vía tiene espacio y señalizar', 'Tocar el claxon para avisar'], r: 1 },
      { p: '¿Está permitido adelantar en un paso de peatones?', ops: ['Sí, si no hay peatones', 'No, está prohibido', 'Solo en vías de más de dos carriles'], r: 1 },
      { p: 'La distancia de seguridad debe permitir:', ops: ['Ver bien las señales', 'Detenerse si el vehículo de delante frena bruscamente', 'Cambiar de carril cómodamente'], r: 1 },
      { p: 'Al adelantar, ¿qué intermitente debes activar?', ops: ['El derecho', 'El izquierdo', 'Ninguno, solo los de emergencia'], r: 1 },
      { p: '¿Se puede adelantar en línea discontinua?', ops: ['No, nunca', 'Sí, si se hace con seguridad', 'Solo en autopistas'], r: 1 },
    ]
  },
];

const TODAS = TEMAS.flatMap(t => t.preguntas.map(p => ({ ...p, tema: t.nombre })));

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const SVG = {
  clock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  x: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  arrow: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`,
  chevron: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
  exam: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  practice: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>`,
  book: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`,
};

let state = { view: 'menu' };

function render() {
  const app = document.getElementById('app');
  const views = { menu: renderMenu, examen: renderExamen, practica: renderPractica, temas: renderTemas, resultado: renderResultado, tema: renderTema };
  app.innerHTML = (views[state.view] || renderMenu)();
  bindEvents();
}

function renderMenu() {
  return `
  <div class="header-pad">
    <h1>Teórico DGT</h1>
    <p class="subtitle">Permiso B — Práctica de examen</p>
    <button class="menu-item" data-action="start-examen">
      <div class="menu-icon">${SVG.exam}</div>
      <div>
        <div class="menu-label">Examen simulado</div>
        <div class="menu-desc">30 preguntas · 40 min · máx. 3 fallos</div>
      </div>
    </button>
    <button class="menu-item" data-action="start-practica">
      <div class="menu-icon">${SVG.practice}</div>
      <div>
        <div class="menu-label">Práctica libre</div>
        <div class="menu-desc">Preguntas aleatorias con feedback inmediato</div>
      </div>
    </button>
    <button class="menu-item" data-action="start-temas">
      <div class="menu-icon">${SVG.book}</div>
      <div>
        <div class="menu-label">Revisar temas</div>
        <div class="menu-desc">Resumen teórico y preguntas por tema</div>
      </div>
    </button>
  </div>`;
}

function renderExamen() {
  const { preguntas, actual, respuestas, tiempo } = state;
  const q = preguntas[actual];
  const total = preguntas.length;
  const fallos = respuestas.filter((r, i) => r !== null && r !== preguntas[i].r).length;
  const mins = Math.floor(tiempo / 60);
  const secs = String(tiempo % 60).padStart(2, '0');
  const pct = ((actual + 1) / total * 100).toFixed(0);
  return `
  <div class="topbar">
    <button class="back-btn" data-action="menu">${SVG.arrow} Salir</button>
    <div class="topbar-right">
      <span id="timer-display">${SVG.clock} ${mins}:${secs}</span>
      <span style="color:${fallos >= 3 ? 'var(--danger-text)' : 'var(--text2)'}">${SVG.x} ${fallos}/3</span>
      <span>${actual + 1}/${total}</span>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  <p class="question-text">${q.p}</p>
  <div id="opciones">
    ${q.ops.map((o, i) => `<button class="option-btn" data-action="resp-examen" data-idx="${i}">${o}</button>`).join('')}
  </div>`;
}

function renderPractica() {
  const { preguntas, actual, respondida, seleccion } = state;
  const q = preguntas[actual];
  return `
  <div class="topbar">
    <button class="back-btn" data-action="menu">${SVG.arrow} Salir</button>
    <div class="topbar-right"><span style="font-size:12px;">${q.tema}</span></div>
  </div>
  <p class="question-text">${q.p}</p>
  <div>
    ${q.ops.map((o, i) => {
      let cls = 'option-btn';
      if (respondida) {
        if (i === q.r) cls += ' option-correct';
        else if (i === seleccion && seleccion !== q.r) cls += ' option-wrong';
      }
      return `<button class="${cls}" data-action="resp-practica" data-idx="${i}" ${respondida ? 'disabled' : ''}>${o}</button>`;
    }).join('')}
  </div>
  ${respondida ? `<button class="next-btn" data-action="next-practica">Siguiente pregunta</button>` : ''}`;
}

function renderTemas() {
  return `
  <div class="topbar">
    <button class="back-btn" data-action="menu">${SVG.arrow} Volver</button>
    <div></div>
  </div>
  <h2 style="margin-bottom:1rem;">Temas</h2>
  ${TEMAS.map(t => `
    <button class="tema-row" data-action="ver-tema" data-id="${t.id}">
      <span class="tema-nombre">${t.nombre}</span>
      <span class="tema-count">${t.preguntas.length} preguntas ${SVG.chevron.replace('svg', 'svg style="width:14px;height:14px;display:inline;vertical-align:-3px;"')}</span>
    </button>
  `).join('')}`;
}

function renderTema() {
  const tema = TEMAS.find(t => t.id === state.temaId);
  const { respondidas } = state;
  return `
  <div class="topbar">
    <button class="back-btn" data-action="start-temas">${SVG.arrow} Temas</button>
    <div></div>
  </div>
  <h2 style="margin-bottom:1rem;">${tema.nombre}</h2>
  <div class="resumen-box">${tema.resumen}</div>
  <h3 style="margin-bottom:1rem;">Preguntas</h3>
  ${tema.preguntas.map((q, qi) => {
    const resp = respondidas[qi];
    return `
    <div class="tema-q">
      <p class="tema-q-text">${q.p}</p>
      ${q.ops.map((o, oi) => {
        let cls = 'tema-opt';
        if (resp !== undefined) {
          if (oi === q.r) cls += ' option-correct';
          else if (oi === resp && resp !== q.r) cls += ' option-wrong';
        }
        return `<button class="${cls}" ${resp !== undefined ? 'disabled' : ''} data-action="resp-tema" data-qi="${qi}" data-oi="${oi}">${o}</button>`;
      }).join('')}
    </div>`;
  }).join('')}`;
}

function renderResultado() {
  const { preguntas, respuestas, tiempoTotal } = state;
  const fallos = respuestas.filter((r, i) => r !== null && r !== preguntas[i].r).length;
  const aciertos = respuestas.filter((r, i) => r === preguntas[i].r).length;
  const aprobado = fallos <= 3;
  const mins = Math.floor(tiempoTotal / 60);
  const secs = String(tiempoTotal % 60).padStart(2, '0');
  return `
  <div style="padding-top:1.25rem;">
    <div class="result-icon">${aprobado ? '✅' : '❌'}</div>
    <h2 class="result-title" style="color:${aprobado ? 'var(--success-text)' : 'var(--danger-text)'};">${aprobado ? 'Aprobado' : 'Suspenso'}</h2>
    <p class="result-sub" style="margin-bottom:1.5rem;">${aprobado ? 'Has superado el umbral mínimo.' : 'Has cometido más de 3 errores.'}</p>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Aciertos</div><div class="stat-value">${aciertos}</div></div>
      <div class="stat-card"><div class="stat-label">Fallos</div><div class="stat-value ${fallos > 3 ? 'color-danger' : ''}">${fallos}</div></div>
      <div class="stat-card"><div class="stat-label">Tiempo</div><div class="stat-value">${mins}:${secs}</div></div>
    </div>
    <button class="next-btn" data-action="menu">Volver al menú</button>
  </div>`;
}

function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });
}

function handleAction(e) {
  const btn = e.currentTarget;
  const action = btn.dataset.action;
  if (action === 'menu') {
    if (state.timer) clearInterval(state.timer);
    state = { view: 'menu' };
  } else if (action === 'start-examen') {
    const preguntas = shuffle(TODAS).slice(0, 30);
    const timer = setInterval(() => {
      state.tiempo++;
      const fallos = state.respuestas.filter((r, i) => r !== null && r !== state.preguntas[i].r).length;
      if (state.tiempo >= 2400 || (fallos >= 3 && state.actual >= state.preguntas.length - 1)) {
        terminarExamen(); return;
      }
      const el = document.getElementById('timer-display');
      if (el) {
        const m = Math.floor(state.tiempo / 60);
        const s = String(state.tiempo % 60).padStart(2, '0');
        el.innerHTML = `${SVG.clock} ${m}:${s}`;
      }
    }, 1000);
    state = { view: 'examen', preguntas, actual: 0, respuestas: new Array(30).fill(null), tiempo: 0, timer };
  } else if (action === 'start-practica') {
    state = { view: 'practica', preguntas: shuffle(TODAS), actual: 0, respondida: false, seleccion: null };
  } else if (action === 'start-temas') {
    if (state.timer) clearInterval(state.timer);
    state = { view: 'temas' };
  } else if (action === 'ver-tema') {
    state = { view: 'tema', temaId: btn.dataset.id, respondidas: {} };
  } else if (action === 'resp-examen') {
    const idx = parseInt(btn.dataset.idx);
    state.respuestas[state.actual] = idx;
    const fallos = state.respuestas.filter((r, i) => r !== null && r !== state.preguntas[i].r).length;
    if (state.actual >= state.preguntas.length - 1 || fallos >= 3) {
      terminarExamen(); return;
    }
    state.actual++;
  } else if (action === 'resp-practica') {
    state.seleccion = parseInt(btn.dataset.idx);
    state.respondida = true;
  } else if (action === 'next-practica') {
    state.actual = (state.actual + 1) % state.preguntas.length;
    state.respondida = false;
    state.seleccion = null;
  } else if (action === 'resp-tema') {
    const qi = parseInt(btn.dataset.qi);
    const oi = parseInt(btn.dataset.oi);
    state.respondidas = { ...state.respondidas, [qi]: oi };
  }
  render();
}

function terminarExamen() {
  if (state.timer) clearInterval(state.timer);
  state.tiempoTotal = state.tiempo;
  state.view = 'resultado';
  render();
}

render();
</script>
</body>
</html>
